name: shijie_tv
description: "A new Flutter project for Shijie TV."
publish_to: 'none'
version: 1.4.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  video_player: ^2.8.2
  chewie: ^1.7.4
  dio: ^5.4.0
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  shimmer: ^3.0.0
  sensors_plus: ^6.0.0
  connectivity_plus: ^6.0.0
  url_launcher: ^6.2.0
  screen_brightness: ^2.1.8

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
